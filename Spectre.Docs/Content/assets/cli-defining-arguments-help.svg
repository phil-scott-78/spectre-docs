<svg viewBox="0 0 1056 528" xmlns="http://www.w3.org/2000/svg"><style>text{white-space:pre;font-family:monospace;font-size:22px;letter-spacing:0;word-spacing:0;text-rendering:geometricPrecision;font-variant-ligatures:none;dominant-baseline:hanging}.fg{fill:#abb2bf}.k{fill:#282c34}.r{fill:#e06c75}.g{fill:#98c379}.y{fill:#e5c07b}.b{fill:#61afef}.m{fill:#c678dd}.c{fill:#56b6c2}.w{fill:#abb2bf}.K{fill:#5c6370}.R{fill:#e06c75}.G{fill:#98c379}.Y{fill:#e5c07b}.B{fill:#61afef}.M{fill:#c678dd}.C{fill:#56b6c2}.W{fill:#fff}.bold{font-weight:bold}.italic{font-style:italic}.underline{text-decoration:underline}</style><defs><clipPath id="terminal-clip"><rect width="1056" height="528" /></clipPath></defs><g transform="translate(0,0)" clip-path="url(#terminal-clip)"><g xml:space="preserve"><text y="0" dy="0.9em"><tspan x="0" textLength="78" class="Y">USAGE:</tspan></text><text y="26" dy="0.9em"><tspan x="0" textLength="208" class="fg">    example.dll </tspan><tspan x="208" textLength="117" class="C">&lt;source&gt; </tspan><tspan x="325" textLength="182" class="w">[destination] </tspan><tspan x="507" textLength="117" class="K">[OPTIONS]</tspan></text><text y="78" dy="0.9em"><tspan x="0" textLength="130" class="Y">ARGUMENTS:</tspan></text><text y="104" dy="0.9em"><tspan x="0" textLength="52" class="fg">    </tspan><tspan x="52" textLength="104" class="w">&lt;source&gt;</tspan><tspan x="156" textLength="416" class="fg">         The source file to copy</tspan></text><text y="130" dy="0.9em"><tspan x="0" textLength="52" class="fg">    </tspan><tspan x="52" textLength="221" class="w">[destination]    </tspan><tspan x="273" textLength="676" class="fg">The destination path (defaults to current directory)</tspan></text><text y="182" dy="0.9em"><tspan x="0" textLength="104" class="Y">OPTIONS:</tspan></text><text y="208" dy="0.9em"><tspan x="0" textLength="429" class="fg">                                 </tspan><tspan x="429" textLength="91" class="G">DEFAULT</tspan></text><text y="234" dy="0.9em"><tspan x="0" textLength="871" class="fg">    -h, --help                              Prints help information</tspan></text><text y="260" dy="0.9em"><tspan x="0" textLength="988" class="fg">    -f, --force                             Overwrite existing files without</tspan></text><text y="286" dy="0.9em"><tspan x="0" textLength="689" class="fg">                                            prompting</tspan></text><text y="312" dy="0.9em"><tspan x="0" textLength="429" class="fg">    -b, --buffer-size            </tspan><tspan x="429" textLength="26" class="fg bold">64</tspan><tspan x="455" textLength="507" class="fg">         Buffer size in KB for the copy</tspan></text><text y="338" dy="0.9em"><tspan x="0" textLength="689" class="fg">                                            operation</tspan></text><text y="364" dy="0.9em"><tspan x="0" textLength="1001" class="fg">        --preserve-timestamps               Preserve original file timestamps</tspan></text><text y="390" dy="0.9em"><tspan x="0" textLength="845" class="fg">    -v                                      Enable verbose output</tspan></text></g></g></svg>