<svg viewBox="0 0 1056 528" xmlns="http://www.w3.org/2000/svg"><style>text{white-space:pre;font-family:monospace;font-size:22px;letter-spacing:0;word-spacing:0;text-rendering:geometricPrecision;font-variant-ligatures:none;dominant-baseline:hanging}.fg{fill:#abb2bf}.k{fill:#282c34}.r{fill:#e06c75}.g{fill:#98c379}.y{fill:#e5c07b}.b{fill:#61afef}.m{fill:#c678dd}.c{fill:#56b6c2}.w{fill:#abb2bf}.K{fill:#5c6370}.R{fill:#e06c75}.G{fill:#98c379}.Y{fill:#e5c07b}.B{fill:#61afef}.M{fill:#c678dd}.C{fill:#56b6c2}.W{fill:#fff}.bold{font-weight:bold}.italic{font-style:italic}.underline{text-decoration:underline}</style><defs><clipPath id="terminal-clip"><rect width="1056" height="528" /></clipPath></defs><g transform="translate(0,0)" clip-path="url(#terminal-clip)"><g xml:space="preserve"><text y="0" dy="0.9em"><tspan x="0" textLength="78" class="Y">USAGE:</tspan></text><text y="26" dy="0.9em"><tspan x="0" textLength="130" class="fg">    myapp </tspan><tspan x="130" textLength="182" class="C">&lt;environment&gt; </tspan><tspan x="312" textLength="117" class="K">[OPTIONS]</tspan></text><text y="78" dy="0.9em"><tspan x="0" textLength="117" class="Y">EXAMPLES:</tspan></text><text y="104" dy="0.9em"><tspan x="0" textLength="130" class="fg">    myapp </tspan><tspan x="130" textLength="130" class="K">production</tspan></text><text y="130" dy="0.9em"><tspan x="0" textLength="130" class="fg">    myapp </tspan><tspan x="130" textLength="195" class="K">staging --force</tspan></text><text y="156" dy="0.9em"><tspan x="0" textLength="130" class="fg">    myapp </tspan><tspan x="130" textLength="299" class="K">dev --dry-run --verbose</tspan></text><text y="208" dy="0.9em"><tspan x="0" textLength="130" class="Y">ARGUMENTS:</tspan></text><text y="234" dy="0.9em"><tspan x="0" textLength="52" class="fg">    </tspan><tspan x="52" textLength="221" class="w">&lt;environment&gt;    </tspan><tspan x="273" textLength="585" class="fg">Target environment (production, staging, dev)</tspan></text><text y="286" dy="0.9em"><tspan x="0" textLength="104" class="Y">OPTIONS:</tspan></text><text y="312" dy="0.9em"><tspan x="0" textLength="273" class="fg">                     </tspan><tspan x="273" textLength="91" class="G">DEFAULT</tspan></text><text y="338" dy="0.9em"><tspan x="0" textLength="715" class="fg">    -h, --help                  Prints help information</tspan></text><text y="364" dy="0.9em"><tspan x="0" textLength="741" class="fg">    -f, --force                 Skip confirmation prompts</tspan></text><text y="390" dy="0.9em"><tspan x="0" textLength="962" class="fg">    -n, --dry-run               Show what would be deployed without making</tspan></text><text y="416" dy="0.9em"><tspan x="0" textLength="507" class="fg">                                changes</tspan></text><text y="442" dy="0.9em"><tspan x="0" textLength="689" class="fg">    -v, --verbose               Enable verbose output</tspan></text><text y="468" dy="0.9em"><tspan x="0" textLength="273" class="fg">        --timeout    </tspan><tspan x="273" textLength="39" class="fg bold">300</tspan><tspan x="312" textLength="481" class="fg">        Deployment timeout in seconds</tspan></text></g></g></svg>